services:
  postgres:
    image: postgres:16-alpine
    container_name: prince-pos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: prince
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: prince_pos
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - prince_pos_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prince -d prince_pos"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: prince-pos-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  prince_pos_pg:
