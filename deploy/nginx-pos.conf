server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name p-o-s.prince-esquire.co.ke pos.prince-esquire.co.ke 137.184.63.96 _;

    # Always send browsers to the HTTPS canonical host (avoids Failed to fetch on IP/http).
    return 301 https://p-o-s.prince-esquire.co.ke$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name p-o-s.prince-esquire.co.ke pos.prince-esquire.co.ke 137.184.63.96 _;

    ssl_certificate /etc/letsencrypt/live/p-o-s.prince-esquire.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/p-o-s.prince-esquire.co.ke/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # API — never cache auth/login traffic
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        add_header Cache-Control "no-store" always;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
